apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sclawion-admin-api
  annotations:
    # Internal + LB only — IAP sits on the HTTPS LB in front. Direct Cloud Run
    # URLs MUST NOT be reachable from the public internet, otherwise IAP can be
    # bypassed.
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/binary-authorization: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "4"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: sclawion-admin-api@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 40
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/sclawion/admin-api:GIT_SHA
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: GCP_PROJECT
              value: PROJECT_ID
            - name: ENV
              value: ENV_NAME
            - name: IAP_AUDIENCE
              # /projects/PROJECT_NUMBER/global/backendServices/BACKEND_ID — set
              # at deploy time once the LB backend is created (deploy/terraform).
              value: IAP_AUDIENCE
