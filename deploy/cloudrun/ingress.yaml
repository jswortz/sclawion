apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sclawion-ingress
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/binary-authorization: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "100"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: sclawion-ingress@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/sclawion/ingress:GIT_SHA
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: GCP_PROJECT
              value: PROJECT_ID
